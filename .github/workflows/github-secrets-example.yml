on:
jobs:
# GitHub Secrets Example Workflow
#
# This workflow demonstrates using GitHub repository secrets in a workflow.
#
# Prerequisites:
# - API_KEY and DATABASE_URL set as repository secrets
#
# Features:
# - Uses GitHub secrets securely
# - Verifies secrets are available
# - Masks secrets in logs
# - Clear job/step names and comments

name: "GitHub Secrets Example"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  verify-github-secrets:
    name: "Verify GitHub Secrets"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Verify secrets are available and masked"
        run: |
          if [ -z "$API_KEY" ] || [ -z "$DATABASE_URL" ]; then
            echo "Missing required secrets!" >&2
            exit 1
          fi
          echo "::add-mask::$API_KEY"
          echo "::add-mask::$DATABASE_URL"
          echo "API_KEY and DATABASE_URL are set and masked."
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
