# AWS Secrets Manager OIDC Example Workflow
#
# This workflow fetches a secret from AWS Secrets Manager using OIDC and scans for secrets with Gitleaks.
# Prerequisites:
# - AWS OIDC role (ARN in AWS_ROLE_TO_ASSUME secret)
# - Secret in AWS Secrets Manager (name/ARN in AWS_SECRET_ID secret)
# - OIDC provider configured in AWS
# - AWS_REGION set as a secret

name: "AWS Secrets Manager OIDC Example"

on:
  workflow_dispatch:

jobs:
  fetch-and-scan-secret:
    name: "Secret Scan & Fetch from AWS"
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_SECRET_ID: ${{ secrets.AWS_SECRET_ID }}
    if: github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Configure AWS credentials via OIDC
        if: env.AWS_REGION != '' && env.AWS_ROLE_TO_ASSUME != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Check if AWS secrets are configured
        id: check_aws
        run: |
          if [ -z "$AWS_SECRET_ID" ]; then
            echo "AWS Secrets not configured. Skipping fetch step."
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Fetch secret from AWS Secrets Manager
        if: steps.check_aws.outputs.configured == 'true'
        id: fetch_secret
        run: |
          set -e
          SECRET_ID="$AWS_SECRET_ID"
          SECRET_VALUE=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ID" --query SecretString --output text)
          echo "::add-mask::$SECRET_VALUE"
          echo "MY_SECRET=$SECRET_VALUE" >> $GITHUB_ENV

      - name: Use secret in workflow (example)
        run: |
          echo "Fetched secret is masked: ${{ env.MY_SECRET }}"