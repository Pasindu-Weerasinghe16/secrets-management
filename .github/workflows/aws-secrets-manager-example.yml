# AWS Secrets Manager OIDC Example Workflow
#
# This workflow fetches a secret from AWS Secrets Manager using OIDC and scans for secrets with Gitleaks.
# Prerequisites:
# - AWS OIDC role (ARN in AWS_ROLE_TO_ASSUME secret)
# - Secret in AWS Secrets Manager (name/ARN in AWS_SECRET_ID secret)
# - OIDC provider configured in AWS
# - AWS_REGION set as a secret

name: "AWS Secrets Manager OIDC Example"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch-and-scan-secret:
    name: "Secret Scan & Fetch from AWS"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch secret from AWS Secrets Manager
        id: fetch_secret
        run: |
          set -e
          SECRET_ID="${{ secrets.AWS_SECRET_ID }}"
          SECRET_VALUE=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ID" --query SecretString --output text)
          echo "::add-mask::$SECRET_VALUE"
          echo "MY_SECRET=$SECRET_VALUE" >> $GITHUB_ENV

      - name: Use secret in workflow (example)
        run: |
          echo "Fetched secret is masked: ${{ env.MY_SECRET }}"