on:
jobs:
# AWS Secrets Manager OIDC Example Workflow
#
# This workflow demonstrates fetching a secret from AWS Secrets Manager using GitHub Actions OIDC authentication.
#
# Prerequisites:
# - AWS OIDC role created and its ARN stored as a GitHub secret: AWS_ROLE_TO_ASSUME
# - Secret exists in AWS Secrets Manager (e.g., production/database/password) and its name/ARN stored as AWS_SECRET_ID
# - OIDC provider configured in AWS for GitHub Actions
# - AWS_REGION set as a GitHub secret
#
# Features:
# - Secure OIDC-based AWS authentication (no static credentials)
# - Secret masking in logs
# - Gitleaks secret scanning
# - Clear job/step names and comments

name: "AWS Secrets Manager OIDC Example"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch-and-scan-secret:
    name: "Secret Scan & Fetch from AWS"
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC authentication
      contents: read
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Run Gitleaks secret scan"
        uses: gitleaks/gitleaks-action@v2
        with:
          args: "detect --source=. --no-git --redact"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Configure AWS credentials via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: "Fetch secret from AWS Secrets Manager"
        id: fetch_secret
        shell: bash
        run: |
          set -e
          SECRET_ID="${{ secrets.AWS_SECRET_ID }}"
          SECRET_VALUE=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ID" --query SecretString --output text)
          echo "::add-mask::$SECRET_VALUE"  # Mask secret in logs
          echo "MY_SECRET=$SECRET_VALUE" >> $GITHUB_ENV

      - name: "Verify secret was fetched"
        run: |
          if [ -z "$MY_SECRET" ]; then
            echo "Secret not fetched!" >&2
            exit 1
          fi
          echo "Fetched secret is masked: $MY_SECRET"
