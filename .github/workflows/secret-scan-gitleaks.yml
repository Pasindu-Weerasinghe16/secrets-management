on:
jobs:
# Gitleaks Secret Scan Workflow
#
# This workflow scans the repository for secrets using Gitleaks on every push and pull request.
#
# Features:
# - Scans for secrets in codebase
# - Runs on push and pull request
# - Uses full git history for accuracy
# - Clear job/step names and comments

name: "Secret Scan (Gitleaks)"

on:
  push:
  pull_request:

jobs:
  gitleaks-scan:
    name: "Gitleaks Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository (full history)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Run Gitleaks scan"
        uses: gitleaks/gitleaks-action@v2
        with:
          args: "detect --source=. --no-git --redact"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
