on:
jobs:
# OIDC-based AWS Secret Fetch Example
#
# This workflow demonstrates fetching a secret from AWS Secrets Manager using OIDC authentication in CI.
#
# Prerequisites:
# - AWS OIDC role created and its ARN set below or as a secret
# - Secret exists in AWS Secrets Manager (e.g., production/database/password)
# - OIDC provider configured in AWS for GitHub Actions
#
# Features:
# - Secure OIDC-based AWS authentication (no static credentials)
# - Secret masking in logs
# - Clear job/step names and comments

name: "CI OIDC AWS Secret Fetch"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch-aws-secret:
    name: "Fetch AWS Secret via OIDC"
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC authentication
      contents: read
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Configure AWS credentials via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239500134025:role/github-actions-secrets-access
          aws-region: us-east-1

      - name: "Fetch secret from AWS Secrets Manager"
        id: fetch_secret
        run: |
          set -e
          SECRET_ID="production/database/password"
          SECRET_VALUE=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ID" --query SecretString --output text)
          echo "::add-mask::$SECRET_VALUE"  # Mask secret in logs
          echo "SECRET_VALUE=$SECRET_VALUE" >> $GITHUB_ENV

      - name: "Use secret in workflow (example)"
        run: |
          echo "Fetched secret is masked: ${{ env.SECRET_VALUE }}"
