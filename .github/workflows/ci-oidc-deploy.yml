name: CI (OIDC) Read Secret

on:
  push:
    branches: [ main ]

jobs:
  read-secret:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::239500134025:role/github-actions-secrets-access
          aws-region: us-east-1

      - name: Get secret value
        run: |
          aws secretsmanager get-secret-value --secret-id production/database/password --query SecretString --output text
