# CI/CD OIDC AWS Deployment Example
#
# This workflow demonstrates OIDC-based AWS authentication for CI/CD deployments.
# Prerequisites:
# - AWS OIDC role (ARN in AWS_ROLE_TO_ASSUME secret)
# - AWS_REGION set as a secret

name: "CI OIDC AWS Deploy"

on:
  workflow_dispatch:

jobs:
  deploy:
    name: "Deploy with OIDC AWS Auth"
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
    if: github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        if: env.AWS_REGION != '' && env.AWS_ROLE_TO_ASSUME != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy step (example)
        run: |
          echo "Deploying with OIDC AWS credentials..."
          # Add your deployment commands here


