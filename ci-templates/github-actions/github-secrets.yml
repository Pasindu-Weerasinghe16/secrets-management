name: Example - GitHub Secrets Only

on:
  workflow_dispatch:

jobs:
  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use GitHub secrets
        run: |
          # Don't print secrets
          test -n "$API_KEY"
          test -n "$DATABASE_URL"
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
