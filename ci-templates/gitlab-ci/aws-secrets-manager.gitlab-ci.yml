stages:
  - deploy

deploy:
  stage: deploy
  image: amazon/aws-cli:2.15.58
  variables:
    AWS_REGION: "us-west-2"
  before_script:
    # Recommended: use GitLab OIDC -> AWS role assumption (preferred).
    # Simpler fallback: AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY as masked/protected vars.
    - aws --version
  script:
    - |
      SECRET=$(aws secretsmanager get-secret-value \
        --secret-id "$AWS_SECRET_ID" \
        --query SecretString \
        --output text)
      echo "Deploying with secret fetched from Secrets Manager"
      test -n "$SECRET"
