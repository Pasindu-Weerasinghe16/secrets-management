services:
  vault:
    image: hashicorp/vault:1.16
    container_name: secrets-management-vault-dev
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    command: ["vault", "server", "-dev"]
    volumes:
      - ./vault-data:/vault/file
